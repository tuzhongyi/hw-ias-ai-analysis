<div class="picture-polygon-multiple">
  <howell-container-zoom
    [fullable]="fullable"
    (full)="on.full()"
    [reset]="reset"
    (resetChange)="on.reset($event)"
  >
    <ias-picture-canvas
      [src]="src"
      [id]="id"
      [default]="default"
      (error)="on.error($event)"
      (canvas)="on.canvas($event)"
      (image)="on.image($event)"
    ></ias-picture-canvas>
  </howell-container-zoom>
</div>

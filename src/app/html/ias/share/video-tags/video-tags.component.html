<div
  class="video-tag-container"
  (mousemove)="video.on.mouse.move()"
  (mouseleave)="video.on.mouse.leave()"
>
  <video
    video-directive
    autoplay="autoplay"
    controls="true"
    [keycontrol]="keycontrol"
    [wheelcontrol]="wheelcontrol"
    [wheel]="video.control.wheel"
    [src]="src"
    (play)="video.on.play()"
    (pause)="video.on.pause()"
    [currentTime]="video.time"
    (loadedmetadata)="video.on.loaded($event)"
    (timeupdate)="video.on.update($event)"
    (error)="video.on.error($event)"
  ></video>
  <div
    class="video-tag-list"
    [style.display]="video.control.visible ? '' : 'none'"
  >
    <div
      class="video-tag-item"
      *ngFor="let item of video.tags | keyvalue"
      [ngStyle]="{
        left: item.key + '%'
      }"
      [title]="item.value.OffsetTime.toString()"
      (click)="video.on.seek(item.value)"
      (mousemove)="video.on.mouse.move()"
      (mouseenter)="video.on.mouse.move()"
      (wheel)="video.on.mouse.wheel($event)"
    ></div>
  </div>
</div>

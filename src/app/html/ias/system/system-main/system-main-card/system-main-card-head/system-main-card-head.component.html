<div class="system-main-card-head">
  <div class="system-main-card-head-content">
    <div class="system-main-card-head-content-icon"></div>
    <div class="system-main-card-head-content-title">
      <svg
        width="100%"
        height="100%"
        xmlns="http://www.w3.org/2000/svg"
        preserveAspectRatio="xMinYMid meet"
      >
        <defs>
          <linearGradient id="headGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="40%" stop-color="#ffffff" />
            <stop offset="70%" stop-color="#69adff" />
          </linearGradient>
        </defs>
        <text
          x="0"
          y="50%"
          dominant-baseline="central"
          font-size="18"
          font-weight="bold"
          font-style="italic"
          fill="url(#headGrad)"
        >
          {{ title }}
        </text>
      </svg>
    </div>
  </div>

  <div class="system-main-card-head-operation">
    <ng-content></ng-content>
  </div>
</div>

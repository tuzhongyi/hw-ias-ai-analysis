<div class="system-module-road-point-table">
  <div class="system-module-road-point-table-body table-split">
    <div class="table-split-head">
      <table border="0" cellpadding="0" cellspacing="0">
        <colgroup>
          <col [ngStyle]="{ width: width }" *ngFor="let width of widths" />
        </colgroup>
        <thead>
          <tr>
            <th class="center">序号</th>
            <th>名称</th>
            <th>屏蔽点类型</th>
            <th>事件类型</th>
            <th>部件类型</th>
            <th>半径</th>
            <th class="center" *ngIf="operable">操作</th>
          </tr>
        </thead>
      </table>
    </div>
    <div class="table-split-body">
      <table border="0" cellpadding="0" cellspacing="0">
        <colgroup>
          <col [ngStyle]="{ width: width }" *ngFor="let width of widths" />
        </colgroup>
        <tbody>
          <tr
            *ngFor="let item of datas; let index = index"
            (click)="onselect(item)"
            [ngClass]="{
              selected: item === selected
            }"
          >
            <td class="center">
              <div>{{ index + 1 }}</div>
            </td>
            <td [title]="item.Name || ''">
              <div>{{ item.Name }}</div>
            </td>
            <td>
              {{ (item.PointTypeName | async) ?? "-" }}
            </td>
            <td [title]="item.EventTypeNames?.replace(',', '\n') ?? ''">
              {{ item.EventTypeNames || "-" }}
            </td>
            <td [title]="item.RoadObjectTypeNames?.replace(',', '\n') ?? ''">
              {{ item.RoadObjectTypeNames || "-" }}
            </td>
            <td>{{ item.Raduis }}米</td>
            <td class="center" *ngIf="operable">
              <div class="operation">
                <div
                  class="button"
                  title="编辑"
                  (click)="onmodify(item, $event)"
                >
                  <i class="howell-icon-modification"></i>
                </div>
                <div
                  class="button"
                  title="删除"
                  (click)="ondelete(item, $event)"
                >
                  <i class="howell-icon-delete2"></i>
                </div>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

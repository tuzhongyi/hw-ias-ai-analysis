<div
  class="map-panel-settings panel-map"
  [ngClass]="{
    'top-left': top && left,
    'top-right': top && !left,
    'bottom-left': !top && left,
    'bottom-right': !top && !left
  }"
>
  <div class="map-panel-settings-button">
    <div class="button">
      <i class="howell-icon-settingoutline"></i>
    </div>
  </div>
  <div class="map-panel-settings-content">
    <div class="map-panel-settings-content-body forms">
      <div class="form-item">
        <div class="form-item-text">
          <label for="map-panel-settings-rectified">轨迹纠偏</label>
        </div>
        <div class="form-item-value">
          <input
            type="checkbox"
            id="map-panel-settings-rectified"
            [(ngModel)]="rectified"
            (change)="on.rectified()"
          />
        </div>
      </div>
      <div class="form-item" *ngIf="pickupvisible">
        <div class="form-item-text">
          <label for="map-panel-settings-pickup">坐标拾取</label>
        </div>
        <div class="form-item-value">
          <input
            type="checkbox"
            id="map-panel-settings-pickup"
            [(ngModel)]="pickupable"
            (change)="on.pickup.enabled()"
          />
        </div>
      </div>
      <div class="form-item">
        <div class="form-item-text">
          <label for="map-panel-settings-display-route">显示行驶路径</label>
        </div>
        <div class="form-item-value">
          <input
            type="checkbox"
            id="map-panel-settings-display-route"
            [(ngModel)]="displayroute"
            (change)="on.display.route()"
          />
        </div>
      </div>
      <div class="form-item">
        <div class="form-item-text">
          <label for="map-panel-settings-display-point">显示点位物件</label>
        </div>
        <div class="form-item-value">
          <input
            type="checkbox"
            id="map-panel-settings-display-point"
            [(ngModel)]="displaypoint"
            (change)="on.display.point()"
          />
        </div>
      </div>
      <div class="form-item">
        <div class="form-item-text">
          <label for="map-panel-settings-display-line">显示线性物件</label>
        </div>
        <div class="form-item-value">
          <input
            type="checkbox"
            id="map-panel-settings-display-line"
            [(ngModel)]="displayline"
            (change)="on.display.line()"
          />
        </div>
      </div>
    </div>
  </div>
</div>

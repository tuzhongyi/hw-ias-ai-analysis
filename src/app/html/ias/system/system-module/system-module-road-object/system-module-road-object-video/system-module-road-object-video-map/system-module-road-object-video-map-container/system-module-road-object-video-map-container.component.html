<div class="system-module-road-object-video-map">
  <div
    class="system-module-road-object-video-map-container"
    id="system-module-road-object-video-map-container"
    [ngStyle]="{
      display: hasdata ? '' : 'none',
    }"
  ></div>

  <div class="loading" *ngIf="loading"></div>
  <div class="nodata" *ngIf="!loading && !hasdata">无数据</div>
</div>

<div class="system-module-road-object-details-info">
  <div class="forms" [class.disabled]="!data.Enabled">
    <div class="form-item">
      <div class="form-item-text">
        <div class="name" text-space-between>采样方案</div>
        <div class="must">*</div>
      </div>
      <div class="form-item-value fill">
        <hw-select [(selected)]="data.SamplePlan" [nullable]="false">
          <select
            [(ngModel)]="data.SamplePlan"
            (change)="on.change()"
            [disabled]="!data.Enabled"
          >
            <ng-container *ngFor="let item of source.plans">
              @if(operable){
              <option [ngValue]="item.Value">
                {{ item.Name }}
              </option>
              } @else{
              <option
                [ngValue]="item.Value"
                *ngIf="item.Value == data.SamplePlan"
              >
                {{ item.Name }}
              </option>
              }
            </ng-container>
          </select>
        </hw-select>
      </div>
    </div>
    <div class="form-item">
      <div class="form-item-text">
        <div class="name" text-space-between>行驶方向</div>
        <div class="must">*</div>
      </div>
      <div class="form-item-value input_button">
        <input
          type="number"
          min="0"
          max="360"
          wheel-input-number
          [(value)]="data.Course"
          [disabled]="!operable || !data.Enabled"
          (valueChange)="on.change()"
        />
        <button class="button-border blue" (click)="on.course()">
          <i class="mdi mdi-av-timer"></i>
        </button>
      </div>
    </div>
    <div class="form-item">
      <div class="form-item-text">
        <div class="name" text-space-between>巡查时间间隔</div>
        <div class="must">*</div>
      </div>
      <div class="form-item-value fill unit">
        <input
          type="number"
          min="0"
          max="365"
          wheel-input-number
          [(value)]="data.InspectionInterval"
          [disabled]="!operable || !data.Enabled"
          (valueChange)="on.change()"
        />
        <i class="text">天</i>
      </div>
    </div>
    <div class="form-item">
      <div class="form-item-text">
        <div class="name" text-space-between>开始距离</div>
        <div class="must">*</div>
      </div>
      <div class="form-item-value fill unit">
        <input
          type="number"
          min="0"
          max="50"
          wheel-input-number
          [(value)]="data.Distance"
          [disabled]="!operable || !data.Enabled"
          (valueChange)="on.change()"
        />
        <i class="text">米</i>
      </div>
    </div>
    <div class="form-item full">
      <div class="form-item-text">
        <div class="name" text-space-between>摄像机方向</div>
      </div>
      <div class="form-item-value fill">
        <howell-select-multiple
          [datas]="camera.sides"
          [selecteds]="camera.selected"
          (selectedsChange)="camera.change($event)"
          [searchable]="false"
        ></howell-select-multiple>
      </div>
    </div>
  </div>
</div>

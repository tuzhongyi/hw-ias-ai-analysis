<div class="system-module-road-info">
  <div class="forms">
    <div class="form-item full">
      <div class="form-item-text" text-space-between>路段名称</div>
      <div class="form-item-value">
        <input type="text" [(ngModel)]="data.Name" (change)="on.change()" />
      </div>
    </div>

    <div class="form-item single">
      <div class="form-item-text" text-space-between>路段类型</div>
      <div class="form-item-value fill">
        <hw-select [(selected)]="data.SectionType" [nullable]="false">
          <select [(ngModel)]="data.SectionType" (change)="on.type()">
            <option [ngValue]="item.Value" *ngFor="let item of source.sections">
              {{ item.Name }}
            </option>
          </select>
        </hw-select>
      </div>
    </div>
    <div class="form-item single">
      <div class="form-item-text" text-space-between>屏蔽半径</div>
      <div class="form-item-value unit">
        <input
          type="number"
          min="0"
          max="100"
          step="1"
          [(ngModel)]="data.Raduis"
          (change)="on.change()"
        />
        <i class="text">米</i>
      </div>
    </div>
    <div class="form-item full" *ngIf="data.SectionType == 1">
      <div class="form-item-text" text-space-between>事件类型</div>
      <div class="form-item-value fill">
        <howell-select-multiple
          [datas]="source.events"
          [selecteds]="event.mobile.selected"
          (selectedsChange)="event.mobile.change($event)"
          [searchable]="false"
        ></howell-select-multiple>
      </div>
    </div>
    <div class="form-item full" *ngIf="data.SectionType == 2">
      <div class="form-item-text" text-space-between>道路部件类型</div>
      <div class="form-item-value fill">
        <howell-select-multiple
          *ngIf="data.SectionType == 2"
          [datas]="source.type.object"
          [selecteds]="event.roadobject.selected"
          (selectedsChange)="event.roadobject.change($event)"
          [searchable]="false"
        ></howell-select-multiple>
      </div>
    </div>

    <div class="form-item full">
      <div class="form-item-text baseline textarea" text-space-between>
        描述
      </div>
      <div class="form-item-value">
        <textarea
          [(ngModel)]="data.Description"
          (change)="on.change()"
        ></textarea>
      </div>
    </div>
  </div>
</div>

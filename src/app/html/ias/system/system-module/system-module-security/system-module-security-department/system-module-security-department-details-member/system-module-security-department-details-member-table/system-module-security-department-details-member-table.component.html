<div class="system-module-security-department-details-member-table">
  <div
    class="system-module-security-department-details-member-table-body table-split"
  >
    <div class="table-split-head">
      <table border="0" cellpadding="0" cellspacing="0">
        <colgroup>
          <col [ngStyle]="{ width: width }" *ngFor="let width of widths" />
        </colgroup>
        <thead>
          <tr>
            <th *ngIf="multiple">
              <input
                type="checkbox"
                class="center"
                [checked]="
                  selecteds.length > 0 && selecteds.length === datas.length
                "
                (click)="on.select.all()"
              />
            </th>
            <th class="center">序号</th>
            <th>姓名</th>
            <th>手机号</th>
            <th class="center">微信绑定</th>
            <th class="center" *ngIf="operable">操作</th>
          </tr>
        </thead>
      </table>
    </div>
    <div class="table-split-body">
      <table border="0" cellpadding="0" cellspacing="0">
        <colgroup>
          <col [ngStyle]="{ width: width }" *ngFor="let width of widths" />
        </colgroup>
        <tbody>
          <tr
            *ngFor="let item of datas; let index = index"
            (click)="on.select.single(item)"
            [ngClass]="{
              selected: selectedIds.includes(item.Id)
            }"
          >
            <td *ngIf="multiple">
              <input
                type="checkbox"
                class="center"
                [checked]="selectedIds.includes(item.Id)"
              />
            </td>
            <td class="center">
              <div>{{ index + 1 }}</div>
            </td>
            <td [title]="item.Name">
              <div>{{ item.Name }}</div>
            </td>
            <td [title]="item.MobileNo || ''">
              <div>{{ item.MobileNo }}</div>
            </td>
            <td class="center">
              @if(item.WeChatOpenId){
              <span class="text-green">已绑定</span>
              }@else{
              <span class="text-orange">未绑定</span>
              }
            </td>
            <td class="center" *ngIf="operable">
              <div class="operation">
                <div
                  class="button"
                  title="编辑"
                  (click)="on.modify(item, $event)"
                >
                  <i class="howell-icon-modification"></i>
                </div>
                <div
                  class="button"
                  title="删除"
                  (click)="on.delete(item, $event)"
                >
                  <i class="howell-icon-delete2"></i>
                </div>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div class="system-module-security-member-table root-router">
  <div class="system-module-security-member-table-body table-page">
    <table
      border="0"
      cellpadding="0"
      cellspacing="0"
      TableSorter
      (sort)="on.sort($event)"
    >
      <colgroup>
        <col
          [ngStyle]="{ width: width, 'min-width': minwidth[i] }"
          *ngFor="let width of widths; let i = index"
        />
      </colgroup>
      <thead>
        <tr>
          <th class="center">序号</th>
          <th sort="Name">姓名</th>
          <th sort="MobileNo">手机号</th>
          <th sort="DivisionId">所属部门</th>
          <th sort="DivisionId">微信绑定</th>
          <th>描述</th>
          <th class="center">操作</th>
        </tr>
      </thead>
      <tbody>
        <tr
          *ngFor="let item of datas; let index = index"
          (click)="onselect(item)"
          [ngClass]="{
            nohover: !item,
            nodata: !item,
            selected: item === selected,
          }"
          [style.height]="page.PageSize ? 100 / page.PageSize + '%' : 'auto'"
        >
          <td class="center">
            <ng-container *ngIf="item">
              {{ page.PageSize * (page.PageIndex - 1) + index + 1 }}
            </ng-container>
            <ng-container *ngIf="item"> &nbsp; </ng-container>
          </td>

          <td [title]="item?.Name ?? ''">
            {{ item?.Name }}
          </td>

          <td>
            @if(item){
            {{ item.MobileNo || "-" }}
            }
          </td>
          <td [title]="">@if(item){ 部门 }</td>
          <td>
            @if(item){ @if(item.WeChatOpenId){
            <span class="text-green">已绑定</span>
            }@else{
            <span class="text-orange">未绑定</span>
            } }
          </td>

          <td [title]="item?.Description || ''">
            @if(item){
            {{ item.Description || "-" }}
            }
          </td>

          <td class="center">
            <div class="operation" *ngIf="item">
              <div
                class="button"
                title="部门详情"
                (click)="on.details(item, $event)"
              >
                <i class="mdi mdi-clipboard-text"></i>
              </div>
              <div
                class="button"
                title="删除部门"
                (click)="on.delete(item, $event)"
              >
                <i class="howell-icon-delete2"></i>
              </div>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  <div
    class="system-module-security-member-table-foot"
    *ngIf="page.TotalRecordCount"
  >
    <paginator [page]="page" (change)="on.page($event)"> </paginator>
  </div>
</div>

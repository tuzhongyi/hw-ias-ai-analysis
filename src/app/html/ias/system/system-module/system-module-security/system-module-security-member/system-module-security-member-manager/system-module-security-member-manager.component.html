<div
  class="system-module-security-member-manager"
  [style.padding]="iswindow ? 0 : undefined"
>
  <div class="system-module-security-member-manager-head">
    <div class="system-module-security-member-manager-head-filter">
      <div class="forms">
        <div class="form-item flex-grow">
          <div class="form-item-text">姓名或手机号</div>
          <div class="form-item-value fill">
            <input type="text" [(ngModel)]="table.args.name" />
          </div>
        </div>
        <div class="form-item submit">
          <button class="button-clip-gradient" (click)="table.search()">
            查找
          </button>
        </div>
      </div>
    </div>
    <div>
      <button class="button-clip-gradient" (click)="on.create()">添加</button>
    </div>
  </div>
  <div class="system-module-security-member-manager-body">
    <ias-system-module-security-member-table
      [args]="table.args"
      [load]="table.load"
      (details)="table.on.details($event)"
      (delete)="confirm.on.open($event)"
    ></ias-system-module-security-member-table>
  </div>

  <ias-window
    *ngIf="window.details.show"
    [Model]="window.details"
    [style]="window.details.style"
    [title]="window.details.title"
  >
    <ias-system-module-security-member-details
      [data]="window.details.data"
      (close)="window.details.show = false"
    ></ias-system-module-security-member-details>
  </ias-window>
  <confirm-window
    *ngIf="window.confirm.show"
    [model]="window.confirm"
    [content]="window.confirm.message"
    (ok)="confirm.on.ok()"
    (cancel)="confirm.on.close()"
  >
  </confirm-window>
</div>

<div class="system-module-patrol-section-table">
  <div class="system-module-patrol-section-table-body table-split">
    <div class="table-split-head">
      <table
        border="0"
        cellpadding="0"
        cellspacing="0"
        TableSorter
        (sort)="on.sort($event)"
      >
        <colgroup>
          <col [ngStyle]="{ width: width }" *ngFor="let width of widths" />
        </colgroup>
        <thead>
          <tr>
            <th class="center">序号</th>
            <th sort="Name">道路名称</th>
            <th class="center" *ngIf="operable">操作</th>
          </tr>
        </thead>
      </table>
    </div>
    <div class="table-split-body">
      <table border="0" cellpadding="0" cellspacing="0">
        <colgroup>
          <col [ngStyle]="{ width: width }" *ngFor="let width of widths" />
        </colgroup>
        <tbody>
          <tr
            *ngFor="let item of datas; let index = index"
            [ngClass]="{
              selected: item === selected,
            }"
            (click)="on.select(item)"
            (mouseover)="on.mouse.in(item)"
            (mouseout)="on.mouse.out(item)"
          >
            <td class="center">
              <div>{{ index + 1 }}</div>
            </td>
            <td [title]="item.Name">
              <div>{{ item.Name }}</div>
            </td>
            <td class="center" *ngIf="operable">
              <div class="operation">
                <div
                  class="button"
                  title="编辑"
                  (click)="on.modify(item, $event)"
                >
                  <i class="howell-icon-modification"></i>
                </div>
                <div
                  class="button"
                  title="删除"
                  (click)="on.delete(item, $event)"
                >
                  <i class="howell-icon-delete2"></i>
                </div>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

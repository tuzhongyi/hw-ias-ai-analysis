<div class="system-event-process-details-realtime">
  <div class="system-event-process-details-realtime-column">
    <div class="system-event-process-details-realtime-picture panel panel-flex">
      <div class="panel-body">
        <howell-container-page
          [page]="record.picture.page.data"
          (pageChange)="record.picture.page.change($event)"
        >
          <ias-picture-polygon-multiple
            [id]="record.picture.src"
            [polygon]="record.picture.polygon"
            [(reset)]="record.picture.reset"
          ></ias-picture-polygon-multiple>
        </howell-container-page>
      </div>
      <div class="panel-foot">
        <div class="panel-foot-title">发现事件</div>
        <div class="button-group">
          <div
            title="预览大图"
            class="button"
            [class.disabled]="disabled.task.full"
            (click)="record.picture.open()"
          >
            <i class="mdi mdi-fullscreen"></i>
          </div>
          <div
            title="重置"
            class="button"
            [class.disabled]="disabled.task.reset"
            (click)="record.picture.reset = true"
          >
            <i class="mdi mdi-backup-restore"></i>
          </div>
        </div>
      </div>
    </div>
    <div class="system-event-process-details-realtime-info panel">
      <ias-system-event-record-details
        [data]="data"
      ></ias-system-event-record-details>
    </div>
  </div>
  <div class="system-event-process-details-realtime-column">
    <div
      class="system-event-process-details-realtime-picture panel panel-flex"
      *ngIf="
        data &&
        data.Assignment &&
        data.Assignment.HandledImageUrls &&
        data.Assignment.HandledImageUrls.length > 0
      "
    >
      <div class="panel-body">
        <howell-container-page
          [page]="handle.picture.page.data"
          (pageChange)="handle.picture.page.change($event)"
        >
          <ias-picture-polygon-multiple
            [id]="handle.picture.src"
            [polygon]="handle.picture.polygon"
            [(reset)]="handle.picture.reset"
          ></ias-picture-polygon-multiple>
        </howell-container-page>
      </div>
      <div class="panel-foot">
        <div class="panel-foot-title">处置完成</div>
        <div class="button-group">
          <div
            title="播放视频"
            class="button"
            [class.disabled]="disabled.result.video"
            (click)="on.video()"
          >
            <i class="mdi mdi-youtube-play"></i>
          </div>
          <div
            title="预览大图"
            class="button"
            [class.disabled]="disabled.result.full"
            (click)="handle.picture.open()"
          >
            <i class="mdi mdi-fullscreen"></i>
          </div>
          <div
            title="重置"
            class="button"
            [class.disabled]="disabled.result.reset"
            (click)="handle.picture.reset = true"
          >
            <i class="mdi mdi-backup-restore"></i>
          </div>
        </div>
      </div>
    </div>
    <div class="system-event-process-details-realtime-map panel">
      <ias-map
        [location]="data?.Location?.GCJ02"
        [marker]="map.marker"
        [shops]="map.point ? [map.point] : []"
      ></ias-map>
    </div>
  </div>
</div>

<div
  style="position: relative"
  [style.width]="size + 'px'"
  [style.height]="size + 'px'"
  #container
>
  @if(selected){
  <div
    style="
      position: absolute;
      top: 50%;
      left: 50%;

      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
      opacity: 0;
      animation: diamondPulse1 2.5s ease-out infinite;
    "
    [style.margin-top]="-(size * 0.9) + 'px'"
    [style.background]="color.value"
    [style.width]="size * 1.8 + 'px'"
    [style.height]="size * 1.8 + 'px'"
    [style.margin-left]="-(size * 0.9) + 'px'"
  ></div>
  <div
    style="
      position: absolute;
      top: 50%;
      left: 50%;

      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
      opacity: 0;
      animation: diamondPulse2 2.5s ease-out infinite 0.4s;
    "
    [style.background]="color.value"
    [style.width]="size * 1.5 + 'px'"
    [style.height]="size * 1.5 + 'px'"
    [style.margin-left]="-(size * 0.75) + 'px'"
    [style.margin-top]="-(size * 0.75) + 'px'"
  ></div>
  }
  <div
    style="
      position: absolute;
      inset: 0;
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    "
    [style.background]="
      'linear-gradient(135deg,' +
      (selected ? color.value : color.value + '55') +
      ',' +
      (selected ? color.value + 'aa' : color.value + '22') +
      ')'
    "
    [style.box-shadow]="
      '0 0 ' + (selected ? 20 : 8) + 'px ' + color + (selected ? '88' : '44')
    "
  ></div>
  <div
    style="
      position: absolute;
      inset: 2px;
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    "
    [style.background]="
      'linear-gradient(135deg,rgba(3,7,18,' +
      (selected ? '0.5' : '0.85') +
      '),rgba(3,7,18,' +
      (selected ? '0.7' : '0.95') +
      '));'
    "
  ></div>
</div>

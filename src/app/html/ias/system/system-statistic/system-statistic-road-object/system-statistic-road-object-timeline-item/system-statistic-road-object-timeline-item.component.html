<div
  class="system-statistic-road-object-timeline-item root-router"
  [class.selected]="selected"
  *ngIf="data"
>
  <div
    class="system-statistic-road-object-timeline-item-type"
    [style.color]="event.color"
  >
    {{ event.name }}
  </div>
  <div class="system-statistic-road-object-timeline-item-image">
    <div
      class="system-statistic-road-object-timeline-item-image-container"
      [style.borderColor]="selected ? event.color : ''"
    >
      <div
        class="system-statistic-road-object-timeline-item-image-container-inner"
        [style.backgroundColor]="selected ? event.color : ''"
      >
        <div
          class="system-statistic-road-object-timeline-item-image-icon"
          [style.backgroundImage]="type.icon"
        ></div>
      </div>
    </div>
    <div
      class="system-statistic-road-object-timeline-item-image-line left"
      *ngIf="!first"
    ></div>
    <div
      class="system-statistic-road-object-timeline-item-image-line right"
      *ngIf="!last"
    ></div>
  </div>
  <div class="system-statistic-road-object-timeline-item-name">
    {{ type.name }}
  </div>
  <div class="system-statistic-road-object-timeline-item-time">
    {{ data.EventTime | date : "HH:mm" }}
  </div>
</div>

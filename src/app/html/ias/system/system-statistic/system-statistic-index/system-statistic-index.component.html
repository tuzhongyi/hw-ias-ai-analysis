<div class="system-statistic-index root-router">
  <div class="system-statistic-index-body">
    <div class="system-statistic-index-body-list">
      <div
        class="system-statistic-index-body-list-item"
        (click)="on.road.object.day()"
      >
        <div
          class="system-statistic-index-body-list-item-icon road-object"
        ></div>
        <div class="system-statistic-index-body-list-item-name">
          道路部件巡检<br />日统计
        </div>
      </div>
      <div
        class="system-statistic-index-body-list-item"
        (click)="on.road.object.duration()"
      >
        <div
          class="system-statistic-index-body-list-item-icon road-object"
        ></div>
        <div class="system-statistic-index-body-list-item-name">
          道路部件巡检统计
        </div>
      </div>
      <div
        class="system-statistic-index-body-list-item"
        (click)="on.road.object.statement()"
      >
        <div
          class="system-statistic-index-body-list-item-icon road-object"
        ></div>
        <div class="system-statistic-index-body-list-item-name">
          道路部件月报表
        </div>
      </div>
      <div
        class="system-statistic-index-body-list-item"
        (click)="on.device_route()"
      >
        <div class="system-statistic-index-body-list-item-icon road"></div>
        <div class="system-statistic-index-body-list-item-name">
          {{ language.device.Name }}行驶统计
        </div>
      </div>
    </div>
  </div>
</div>

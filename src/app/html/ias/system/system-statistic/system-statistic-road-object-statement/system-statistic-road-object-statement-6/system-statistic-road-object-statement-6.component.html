<ias-system-statistic-road-object-statement-container *ngIf="statement">
  <div class="system-statistic-road-object-statement-6">
    <div class="system-statistic-road-object-statement-6-head">事件图表</div>
    <div class="system-statistic-road-object-statement-6-body">
      <div class="system-statistic-road-object-statement-6-content" *ngIf="max">
        本月每日的事件数量统计，其中{{
          max.time | date : Language.day
        }}事件最多，为{{ max.value }}起。
      </div>
      <div class="system-statistic-road-object-statement-6-chart">
        <ias-system-statistic-road-object-statement-6-chart
          [datas]="datas"
          [xAxis]="xAxis"
        ></ias-system-statistic-road-object-statement-6-chart>
      </div>
    </div>
  </div>
</ias-system-statistic-road-object-statement-container>

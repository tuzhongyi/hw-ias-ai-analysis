<div class="system-statistic-road-object-statement-3-item">
  <div class="system-statistic-road-object-statement-3-item-icon">
    <i [class]="model.icon"></i>
  </div>
  <div class="system-statistic-road-object-statement-3-item-content">
    <div class="system-statistic-road-object-statement-3-item-name">
      {{ model.name }}
    </div>
    <div>共计{{ model.count }}个</div>
    <div>占比为{{ model.ratio }}%</div>
  </div>
</div>
